name: Update Index Stars & Repo Stats (auto)

concurrency:
  group: index-release-publisher
  cancel-in-progress: false

on:
  schedule:
    - cron: "17 * * * *" # hourly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check GitHub App auth availability
        id: check-app-auth
        run: |
          if [ -n "$APP_ID" ] && [ -n "$APP_KEY" ]; then
            echo "has_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          APP_ID: ${{{{ secrets.A0_BOT_APP_ID }}}}
          APP_KEY: ${{{{ secrets.A0_BOT_PRIVATE_KEY }}}}
      - name: Create bot app token
        id: bot-app-token
        uses: actions/create-github-app-token@v1
        if: steps.check-app-auth.outputs.has_app == 'true'
        with:
          app-id: ${{ secrets.A0_BOT_APP_ID }}
          private-key: ${{ secrets.A0_BOT_PRIVATE_KEY }}

      - name: Set fallback token
        id: fallback-token
        if: ${{ steps.bot-app-token.outputs.token == '' }}
        run: echo "token=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_OUTPUT

      - name: Resolve API token
        id: api-token
        run: |
          TOKEN="${{ steps.bot-app-token.outputs.token || steps.fallback-token.outputs.token }}"
          echo "token=${TOKEN}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download index.json from tagged Release
        env:
          GITHUB_TOKEN: ${{ steps.api-token.outputs.token }}
          INDEX_RELEASE_TAG: generated-index
        run: |
          python scripts/download_index_release.py

      - name: Scan repo stats (write repo_stats_updates.json)
        env:
          GITHUB_TOKEN: ${{ steps.api-token.outputs.token }}
          STARS_CHUNK_SIZE: "50"
        run: |
          python scripts/update_index_stars.py --mode scan

      - name: Refresh index.json from tagged Release
        env:
          GITHUB_TOKEN: ${{ steps.api-token.outputs.token }}
          INDEX_RELEASE_TAG: generated-index
        run: |
          python scripts/download_index_release.py

      - name: Apply repo stats updates to refreshed index.json
        run: |
          python scripts/update_index_stars.py --mode apply

      - name: Publish updated index.json to Release (replace asset)
        env:
          GITHUB_TOKEN: ${{ steps.api-token.outputs.token }}
          INDEX_RELEASE_TAG: generated-index
        run: |
          python scripts/publish_index_release.py
