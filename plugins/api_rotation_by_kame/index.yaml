title: KAME — API Rotation & Stability Engine
description: High-availability API-key rotation for Agent Zero. KAME tracks the health of each provider and model, predicts rate limits, and rotates keys before you hit 429s. It honors real retryDelay hints, rests daily-exhausted keys for a full cooldown, escalates gently through 503 outages, and waits out downtime instead of burning requests — keeping long agent runs alive across multiple free LLM providers.
